name: Build HisabWin Installer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Pre-fetch Natural Earth shapefiles (110m) untuk bundel offline
      shell: powershell
      run: |
        # hisabwin.py cuma pakai 4 shapefile Natural Earth 110m ini (LAND,
        # OCEAN, COASTLINE, BORDERS -- lihat cfeature.LAND/OCEAN/COASTLINE/
        # BORDERS di kode). Cartopy TIDAK membundel shapefile ini secara
        # default -- normalnya diunduh dari naturalearth.s3.amazonaws.com
        # saat PERTAMA KALI user generate peta, yang butuh internet dan bisa
        # gagal total kalau mesin user offline (padahal astronominya sendiri
        # sudah didesain 100% offline lewat de421.bsp/VSOP87). Di-fetch
        # sekali di sini (runner GitHub Actions selalu online), lalu hasil
        # cache-nya di-bundel ke exe lewat --add-data supaya user gak perlu
        # akses internet sama sekali.
        python -c "import cartopy.io.shapereader as s; [s.natural_earth(resolution='110m', category=c, name=n) for c, n in [('physical','land'),('physical','ocean'),('physical','coastline'),('cultural','admin_0_boundary_lines_land')]]"
        $dataDir = (python -c "import cartopy; print(cartopy.config['data_dir'])").Trim()
        Copy-Item -Path $dataDir -Destination "cartopy_data" -Recurse
        Write-Host "Shapefile Natural Earth di-cache ke: $dataDir"
        Write-Host "Dibundel ke folder cartopy_data/ (struktur sama, dipakai oleh"
        Write-Host "cartopy.config['pre_existing_data_dir'] di hisabwin.py saat frozen)"

    - name: Build HisabWin Executable
      shell: powershell
      run: |
        pyinstaller --noconfirm --windowed --onedir `
          --name HisabWin `
          --icon "logo.ico" `
          --splash "splash.png" `
          --collect-data cartopy `
          --collect-submodules shapely `
          --exclude-module scipy `
          --exclude-module pandas `
          --exclude-module sqlalchemy `
          --exclude-module psycopg2 `
          --exclude-module greenlet `
          --exclude-module numba `
          --exclude-module llvmlite `
          --exclude-module astropy `
          --exclude-module astropy_iers_data `
          --exclude-module erfa `
          --exclude-module Cython `
          --exclude-module yaml `
          --exclude-module IPython `
          --exclude-module jupyter `
          --exclude-module notebook `
          --add-data "logo.png;." `
          --add-data "mainland_amerika_mask.npz;." `
          --add-data "de421.bsp;." `
          --add-data "cartopy_data;cartopy_data" `
          hisabwin.py

    - name: Prepare HisabWin.7z Archive
      shell: powershell
      run: |
        # Zip the PyInstaller output directory (dist/HisabWin)
        Push-Location dist
        & "C:\Program Files\7-Zip\7z.exe" a -t7z HisabWin.7z HisabWin
        Pop-Location

    - name: Build Installer and Uninstaller
      shell: powershell
      run: |
        powershell -ExecutionPolicy Bypass -File build_installer.ps1

    - name: Upload Installer Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: HisabWin-Installer
        path: |
          dist/HisabWin_Installer.exe
          dist/HisabWin_Uninstaller.exe
